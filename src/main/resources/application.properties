spring.application.name=user-service

# Database Configuration
# These values can be overridden by environment variables from docker-compose.yml
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/userservicedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dokoadmin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dokoadmin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# IMPORTANT: Change this secret key in production! Use environment variable JWT_SECRET
# Generated using SecureRandom with 512 bits (64 bytes) of entropy
jwt.secret=${JWT_SECRET:2rKHGpllXnbAhnNZ1Wu1m50QFj/vovaH3li8OpwPUJiLx78Oye/vTNR30FTif6GvYDzbrhnQeTlnQbv4cjZcRg==}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# OAuth2 Client Configuration
# After OAuth2 login success, we generate a JWT token for the user
# Frontend redirect URL where JWT token will be sent
oauth2.frontend-redirect-url=${OAUTH2_FRONTEND_REDIRECT_URL:http://localhost:5173/oauth2/redirect}

# OAuth2 Client Configuration - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080}/login/oauth2/code/google

# OAuth2 Client Configuration - Facebook
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:1544301373561163}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:8bde188373e1a498eb7ab67ed02aa765}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080}/login/oauth2/code/facebook

# OAuth2 Client Configuration - Apple
spring.security.oauth2.client.registration.apple.client-id=${APPLE_CLIENT_ID:your-apple-client-id}
spring.security.oauth2.client.registration.apple.client-secret=${APPLE_CLIENT_SECRET:your-apple-client-secret}
spring.security.oauth2.client.registration.apple.scope=name,email
spring.security.oauth2.client.registration.apple.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080}/login/oauth2/code/apple
spring.security.oauth2.client.registration.apple.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.apple.client-name=Apple

# Apple Provider Configuration
spring.security.oauth2.client.provider.apple.authorization-uri=https://appleid.apple.com/auth/authorize
spring.security.oauth2.client.provider.apple.token-uri=https://appleid.apple.com/auth/token
spring.security.oauth2.client.provider.apple.user-info-uri=https://appleid.apple.com/auth/userinfo
spring.security.oauth2.client.provider.apple.jwk-set-uri=https://appleid.apple.com/auth/keys
spring.security.oauth2.client.provider.apple.user-name-attribute=sub

