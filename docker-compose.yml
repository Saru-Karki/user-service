services:
  postgres:
    image: postgres:16
    container_name: dokotech-postgres
    environment:
        POSTGRES_USER: dokoadmin
        POSTGRES_PASSWORD: dokoadmin123
        POSTGRES_DB: userservicedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: dokotech-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: karkisaru551@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Kathmandu@123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  user-service:
    build:
      context: .
      dockerfile: Dockerfile   # Dockerfile that runs mvn spring-boot:run
    container_name: dokotech-user-service
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - ~/.m2:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userservicedb
      SPRING_DATASOURCE_USERNAME: dokoadmin
      SPRING_DATASOURCE_PASSWORD: dokoadmin123
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-2rKHGpllXnbAhnNZ1Wu1m50QFj/vovaH3li8OpwPUJiLx78Oye/vTNR30FTif6GvYDzbrhnQeTlnQbv4cjZcRg==}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      # OAuth2 Configuration
      OAUTH2_FRONTEND_REDIRECT_URL: ${OAUTH2_FRONTEND_REDIRECT_URL:-http://localhost:5173/oauth2/redirect}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-http://localhost:8080}
      # Google OAuth2 (Get credentials from https://console.cloud.google.com/)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-3278949970-g49sc0js0cqvgtrl9185eirkhkq94u05.apps.googleusercontent.com}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-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}
      # Facebook OAuth2 (Get credentials from https://developers.facebook.com/)
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-1544301373561163}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-8bde188373e1a498eb7ab67ed02aa765}
      # Apple OAuth2 (Get credentials from https://developer.apple.com/)
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-your-apple-client-id}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-your-apple-client-secret}
    depends_on:
      - postgres

volumes:
  pgdata: